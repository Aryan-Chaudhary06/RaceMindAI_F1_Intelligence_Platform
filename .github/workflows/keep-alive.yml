name: Keep Streamlit App Awake

on:
  schedule:
    # Runs every 6 hours (well under the 12-hour sleep threshold)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Lets you trigger it manually from the Actions tab to test it

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping RaceMindAI app
        run: |
          echo "Pinging app at $(date)"
          curl -sSf --max-time 30 -o /dev/null -w "HTTP status: %{http_code}\n" \
            https://racemindaif1intelligenceplatform-rehy7xblrfemfamtlsgurf.streamlit.app/ \
            || echo "Ping failed, but not failing the job — app may just be slow to respond."
